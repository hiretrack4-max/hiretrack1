name: keep-alive

# Keeps the free Render backend warm so the app doesn't cold-start (~50s) after
# 15 minutes of inactivity. Pings the public health endpoint every 10 minutes.
#
# NOTE: GitHub's scheduled runs are best-effort and can be delayed under load,
# so an occasional cold start is still possible. For rock-solid warmth, also add
# a free external monitor (e.g. UptimeRobot / cron-job.org) hitting the same URL
# every 5 minutes.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC)
  workflow_dispatch: {}       # allow manual "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS -m 30 -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" \
            https://hiretrack-api-5ltg.onrender.com/admin/login/ || echo "ping failed (will retry next run)"
