<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafaf9" />
    <meta
      name="description"
      content="HireTrack — a premium HR recruitment portal for managing jobs, candidates and hiring pipelines."
    />
    <title>HireTrack — Recruitment Portal</title>
    <script>
      // Resolve the theme before paint to avoid a flash of the wrong palette.
      // HireTrack is light-first: default to light unless the user picked dark
      // or the OS prefers dark with no explicit choice.
      (function () {
        var t;
        try {
          t = localStorage.getItem('hiretrack.theme');
        } catch (e) {}
        if (t !== 'light' && t !== 'dark') {
          t =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        }
        var root = document.documentElement;
        root.setAttribute('data-theme', t);
        if (t === 'dark') root.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
