# Render Blueprint for the HireTrack Django API.
# Import this repo at https://dashboard.render.com → New → Blueprint.
# The frontend is deployed separately on Vercel; the database is Neon (set the
# POSTGRES_* values below to the Neon connection details). Secrets marked
# `sync: false` are entered in the Render dashboard, never committed.
services:
  - type: web
    name: hiretrack-api
    runtime: python
    plan: free
    rootDir: backend
    branch: main
    autoDeploy: true          # redeploy automatically on every push to main
    buildCommand: "bash ./build.sh"
    # Must bind 0.0.0.0 and Render's $PORT (default gunicorn 127.0.0.1:8000 is
    # unreachable by Render's router → health-check timeout).
    startCommand: "gunicorn hiretrack.wsgi:application --bind 0.0.0.0:$PORT"
    # Must return 2xx without auth, else Render marks the deploy unhealthy.
    # The admin login page renders 200; the API endpoints require a token (401).
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DJANGO_DEBUG
        value: "False"
      # Auto-generated strong secret; no need to set it by hand.
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Render injects the service's own hostname — add it to ALLOWED_HOSTS.
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: hiretrack-api
          property: host
      # The rest are entered in the dashboard (Neon creds, deployed origins, R2).
      - key: DJANGO_CSRF_TRUSTED_ORIGINS   # e.g. https://hiretrack.vercel.app
        sync: false
      - key: CORS_ALLOWED_ORIGINS          # e.g. https://hiretrack.vercel.app
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_HOST                 # Neon endpoint host
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_SSLMODE
        value: "require"
      # Cloudflare R2 (resume file storage). Leave unset to use local disk.
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT_URL               # https://<accountid>.r2.cloudflarestorage.com
        sync: false
